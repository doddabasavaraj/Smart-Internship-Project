<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#f4f6f9;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:0;top:0;
  width:240px;
  height:100vh;
  background:linear-gradient(180deg,#12263a,#0d1b2a);
  color:#fff;
  padding:20px;
  animation:slideIn 1s ease;
}
.profile{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:30px;
}
.profile img{
  width:45px;height:45px;
  border-radius:50%;
}
.profile span{color:#4cd964;font-size:12px}

.menu a{
  display:flex;
  align-items:center;
  gap:14px;
  padding:12px;
  color:#ddd;
  text-decoration:none;
  border-radius:6px;
  transition:.3s;
}
.menu a:hover{
  background:#ff6a00;
  color:#fff;
  transform:translateX(6px);
}

/* TOPBAR */
.topbar{
  margin-left:240px;
  height:60px;
  background:#12263a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 25px;
  color:#fff;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:20px;
  font-weight:700;
}
.logo span{color:#ff6a00}

.icons i{
  margin-left:20px;
  cursor:pointer;
  transition:.3s;
}
.icons i:hover{color:#ff6a00;transform:scale(1.2)}

/* MAIN */
.main{
  margin-left:240px;
  padding:30px;
  animation:fadeUp 1.2s ease;
}
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}
.card{
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 15px 30px rgba(0,0,0,.08);
  text-align:center;
  transition:.4s;
}
.card:hover{
  transform:translateY(-8px);
}
.card i{
  font-size:32px;
  margin-bottom:10px;
}
.orange{color:#ff9800}
.blue{color:#2196f3}
.green{color:#4caf50}
.pink{color:#e91e63}

/* SOCIAL */
.social{
  margin-top:30px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
  gap:20px;
}
.social-box{
  color:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
  animation:scaleIn .8s ease;
}
.fb{background:#3b5998}
.tw{background:#1da1f2}
.in{background:#0077b5}
.gp{background:#db4437}

/* CHART */
.chart-box{
  margin-top:40px;
  background:#fff;
  padding:25px;
  border-radius:10px;
  box-shadow:0 15px 30px rgba(0,0,0,.08);
}

/* ANIMATIONS */
@keyframes slideIn{
  from{transform:translateX(-100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(40px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes scaleIn{
  from{transform:scale(.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="profile">
    <img src="img4.jpg.jpeg">
    <div>
      <strong>DSATM</strong><br>
      <span>● Online</span>
    </div>
  </div>

  <div class="menu">
    <a href="#"><i class="fas fa-gauge"></i> Dashboard</a>
    <a href="#"><i class="fas fa-layer-group"></i> Widgets</a>
    <a href="#"><i class="fas fa-gem"></i> Elements</a>
    <a href="#"><i class="fas fa-table"></i> Tables</a>
    <a href="#"><i class="fas fa-chart-line"></i> Charts</a>
    <a href="#"><i class="fas fa-gear"></i> Settings</a>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo"><span>●</span> Smart Internship</div>
  <div class="icons">
    <i class="fas fa-bell"></i>
    <i class="fas fa-envelope"></i>
    <i class="fas fa-user-circle"></i>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <h2>Dashboard</h2><br>

  <div class="cards">
    <div class="card"><i class="fas fa-user orange"></i><h2 id="c1">0</h2><p>Welcome</p></div>
    <div class="card"><i class="fas fa-clock blue"></i><h2 id="c2">0</h2><p>Average Time</p></div>
    <div class="card"><i class="fas fa-cloud-download green"></i><h2 id="c3">0</h2><p>Collections</p></div>
    <div class="card"><i class="fas fa-comments pink"></i><h2 id="c4">0</h2><p>Comments</p></div>
  </div>

  <div class="social">
    <div class="social-box fb"><i class="fab fa-facebook-f"></i><h3>35k</h3>Friends</div>
    <div class="social-box tw"><i class="fab fa-twitter"></i><h3>584k</h3>Followers</div>
    <div class="social-box in"><i class="fab fa-linkedin-in"></i><h3>758+</h3>Contacts</div>
    <div class="social-box gp"><i class="fab fa-google-plus-g"></i><h3>450</h3>Followers</div>
  </div>

  <div class="chart-box">
    <h3>Extra Area Chart</h3>
    <canvas id="chart"></canvas>
  </div>

</div>

<script>
/* COUNTER ANIMATION */
function counter(id,target){
  let i=0;
  let interval=setInterval(()=>{
    i+=Math.ceil(target/50);
    if(i>=target){i=target;clearInterval(interval)}
    document.getElementById(id).innerText=i;
  },30);
}
counter("c1",2500);
counter("c2",123);
counter("c3",1805);
counter("c4",54);

/* CHART */
new Chart(document.getElementById("chart"),{
  type:'line',
  data:{
    labels:['Jan','Feb','Mar','Apr','May','Jun'],
    datasets:[
      {label:'Dataset 1',data:[20,45,30,60,40,80],borderColor:'#ff9800',fill:false},
      {label:'Dataset 2',data:[10,30,50,40,70,60],borderColor:'#4caf50',fill:false},
      {label:'Dataset 3',data:[40,20,60,30,50,90],borderColor:'#2196f3',fill:false}
    ]
  }
});
</script>

</body>
</html>
