<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Portfolio</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Poppins',sans-serif;
  background:#1f2235;
  color:#fff;
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 80px;
  animation:slideDown 1s ease;
}
.logo{
  font-size:22px;
  font-weight:700;
}
.logo span{color:#ff4d5a}
nav a{
  margin:0 18px;
  color:#ddd;
  text-decoration:none;
  font-size:14px;
  position:relative;
}
nav a::after{
  content:"";
  position:absolute;
  left:0;bottom:-6px;
  width:0;height:2px;
  background:#ff4d5a;
  transition:.3s;
}

.btn-primary {
      background: rgb(255, 124, 1);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }
nav a:hover::after{width:100%}

/* HERO */
.hero{
  min-height:85vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:0 80px;
}

/* LEFT */
.hero-left{
  animation:fadeLeft 1.2s ease;
}
.socials{
  display:flex;
  gap:15px;
  margin-bottom:25px;
}
.socials a{
  width:40px;height:40px;
  border:1px solid #ff4d5a;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#ff4d5a;
  transition:.3s;
}
.socials a:hover{
  background:#ff4d5a;
  color:#fff;
  transform:scale(1.15);
}

.hero-left h1{
  font-size:46px;
  margin-bottom:15px;
}
.hero-left p{
  color:#bbb;
  max-width:460px;
  margin-bottom:30px;
}

.buttons{
  display:flex;
  gap:20px;
}
.btn{
  padding:12px 28px;
  border-radius:30px;
  border:1px solid #ff4d5a;
  background:none;
  color:#fff;
  cursor:pointer;
  transition:.4s;
}
.btn.primary{
  background:#ff4d5a;
}
.btn:hover{
  transform:translateY(-4px);
  box-shadow:0 15px 30px rgba(255,77,90,.4);
}

/* RIGHT */
.hero-right{
  position:relative;
  text-align:center;
  animation:fadeRight 1.2s ease;
}
.hero-right img{
  width:380px;
  border-radius:18px;
  filter:drop-shadow(0 30px 50px rgba(0,0,0,.6));
  animation:float 4s ease-in-out infinite;
}

/* SERVICES TEXT */
.services{
  text-align:center;
  padding:60px 0;
  color:#aaa;
}
.services h3{
  color:#ff4d5a;
  letter-spacing:2px;
  font-size:13px;
}
.services h2{
  color:#fff;
  margin-top:10px;
}

/* ANIMATIONS */
@keyframes slideDown{
  from{opacity:0;transform:translateY(-30px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes fadeLeft{
  from{opacity:0;transform:translateX(-60px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes fadeRight{
  from{opacity:0;transform:translateX(60px)}
  to{opacity:1;transform:translateX(0)}
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-18px)}
}

/* RESPONSIVE */
@media(max-width:900px){
  header{padding:20px}
  .hero{grid-template-columns:1fr;text-align:center;padding:40px}
  .buttons{justify-content:center}
  .hero-right img{width:280px;margin-top:40px}
}
</style>
</head>

<body>

<header>
  <div class="logo">Smart<span> Internship</span></div>
  <nav>
      <a target="_blank" href="SI1.html">Home</a>
      <a target="_blank" href="about.html">About us</a>
      <a target="_blank" href="admin.html">Admin</a>
      <a target="_blank" href="info.html">Info</a>
      <a target="_parent" href="GetStarted.html" class="btn-primary">Get Started</a>
  </nav>
</header>

<section class="hero">

  <!-- LEFT -->
  <div class="hero-left">
    <div class="socials">
      <a href="#"><i class="fab fa-facebook-f"></i></a>
      <a href="#"><i class="fab fa-twitter"></i></a>
      <a href="#"><i class="fab fa-pinterest-p"></i></a>
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-behance"></i></a>
    </div>

    <h1>Smart Inernship recommender</h1>
    <p>An internship is recommended to gain hands-on experience, improve technical skills,
        and build confidence for future job opportunities.</p>

    <div class="buttons">
      <button class="btn">My Portfolio</button>
      <button class="btn primary"><i class="fas fa-play"></i></button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="hero-right">
    <img src="img4.jpg.jpeg" alt="Profile">
  </div>

</section>

<section class="services">
  <h3>SERVICES</h3>
  <h2>My Services</h2>
</section>

<script>
// subtle button click feedback
document.querySelectorAll('.btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    btn.style.transform='scale(0.95)';
    setTimeout(()=>btn.style.transform='',150);
  });
});
</script>

</body>
</html>
