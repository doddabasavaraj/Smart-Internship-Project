<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internship Landing Page</title>
  <style>
    :root {
      --purple: #7a3ff2;
      --yellow: #f4b400;
      --dark: #333;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: #fff;
      color: var(--dark);
      overflow-x: hidden;
    }

    /* ---------------- NAVBAR ---------------- */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 60px;
      animation: slideDown 1s ease forwards;
    }

    .logo {
      font-weight: 700;
      color: var(--purple);
      letter-spacing: 1px;
    }

    nav a {
      margin: 0 14px;
      text-decoration: none;
      color: #666;
      font-weight: 500;
      position: relative;
    }

    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 0;
      height: 2px;
      background: var(--purple);
      transition: width 0.3s;
    }

    nav a:hover::after {
      width: 100%;
    }

    .btn-primary {
      background: var(--yellow);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    /* ---------------- HERO ---------------- */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      padding: 60px;
      gap: 40px;
    }

    .hero-text {
      animation: fadeLeft 1.2s ease forwards;
    }

    .hero-text h1 {
      font-size: 52px;
      color: var(--purple);
      margin-bottom: 15px;
    }

    .hero-text p {
      max-width: 420px;
      line-height: 1.6;
      color: #777;
    }

    .btn-secondary {
      display: inline-block;
      margin-top: 25px;
      background: var(--yellow);
      color: #fff;
      padding: 12px 26px;
      border-radius: 25px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .btn-secondary:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* ---------------- IMAGES ---------------- */
    .hero-images {
      position: relative;
      animation: fadeRight 1.4s ease forwards;
    }

    .hero-images img {
      max-width: 100%;
    }

    .bg-shape {
      position: absolute;
      top: -40px;
      left: -40px;
      z-index: -1;
      width: 110%;
      animation: float 6s ease-in-out infinite;
    }

    /* ---------------- ANIMATIONS ---------------- */
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(-60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes fadeRight {
      from { opacity: 0; transform: translateX(60px); }
      to { opacity: 1; transform: translateX(0); }
    }

    @keyframes float {
      0% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
      100% { transform: translateY(0); }
    }

    /* ---------------- RESPONSIVE ---------------- */
    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
      }
      header {
        padding: 20px;
      }
      .hero-text p {
        margin: auto;
      }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <header>
    <div class="logo">Smart Internship</div>
    <nav>
      <a href="SI1.html">Home</a>
      <a href="about.html">About us</a>
      <a href="admin.html">Admin</a>
      <a href="#">Info</a>
      <a href="GetStarted.html" class="btn-primary">Get Started</a>
    </nav>
  </header>

  <!-- HERO SECTION -->
  <section class="hero">
    <div class="hero-text">
      <h1>Internship</h1>
      <p>
        Lorem ipsum dolor sit amet, consectetur adipiscing elit.
        Sed eget libero feugiat, faucibus libero id, scelerisque quam.
      </p>
      <a href="#" class="btn-secondary">Learn More</a>
    </div>

    <div class="hero-images">
      <img class="bg-shape" src="img1.jpg" alt="Background" />
      <img src="collage.jpg" alt="Internship Illustration" />
    </div>
  </section>

  <script>
    // Button animation feedback
    document.querySelector('.btn-secondary').addEventListener('click', () => {
      document.querySelector('.hero-text').style.transform = 'scale(1.03)';
      setTimeout(() => {
        document.querySelector('.hero-text').style.transform = 'scale(1)';
      }, 200);
    });
  </script>

</body>
</html>
