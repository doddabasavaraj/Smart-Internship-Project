<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Started | AZ Model</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
   <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Poppins',sans-serif;
      height:100vh;
      overflow:hidden;
    }

    /* BACKGROUND */
    .bg{
      position:fixed;
      inset:0;
      background:url('https://images.unsplash.com/photo-1520975922284-7b958f03f9b4') center/cover no-repeat;
      animation:zoomBg 20s infinite alternate;
    }
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.65);
    }

    /* NAVBAR */
    header{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:25px 70px;
      color:#fff;
      animation:slideDown 1s ease;
    }

    header h1{
      font-size:24px;
      font-weight:700;
    }

    nav a{
      color:#fff;
      margin:0 18px;
      text-decoration:none;
      font-size:14px;
      position:relative;
    }

    nav a::after{
      content:"";
      position:absolute;
      left:0;bottom:-5px;
      width:0;height:2px;
      background:#facc15;
      transition:.3s;
    }
    nav a:hover::after{width:100%}

    /* CARD */
    .container{
      position:relative;
      z-index:2;
      height:calc(100vh - 100px);
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .card{
      width:850px;
      background:rgba(255,255,255,0.12);
      backdrop-filter:blur(18px);
      border-radius:18px;
      display:grid;
      grid-template-columns:1fr 1fr;
      overflow:hidden;
      box-shadow:0 40px 80px rgba(0,0,0,0.5);
      animation:scaleIn 1.2s ease;
    }

    .left{
      padding:60px;
      color:#fff;
      animation:fadeLeft 1.3s ease;
    }

    .left h2{
      font-size:36px;
      margin-bottom:15px;
    }

    .left span{color:#facc15}

    .right{
      padding:60px;
      background:rgba(0,0,0,0.45);
      color:#fff;
      animation:fadeRight 1.3s ease;
    }

    .right h3{
      font-size:24px;
      margin-bottom:25px;
    }

    .right input{
      width:100%;
      padding:10px;
      margin-bottom:18px;
      border:none;
      border-radius:6px;
      outline:none;
      background:rgba(255,255,255,0.2);
      color:#fff;
    }

    .right input::placeholder{
      color:#ddd;
      font-size: 12px;}

    .right button{
      width:100%;
      padding:14px;
      background:#facc15;
      border:none;
      border-radius:6px;
      font-weight:600;
      cursor:pointer;
      transition:.3s;
    }

    .right button:hover{
      transform:translateY(-3px);
      box-shadow:0 15px 30px rgba(250,204,21,0.6);
    }

    .social{
      margin-top:25px;
      display:flex;
      gap:18px;
    }

    .social i{
      font-size:20px;
      cursor:pointer;
      transition:.3s;
    }

    .social i:hover{transform:scale(1.3);color:#facc15}

    /* ANIMATIONS */
    @keyframes slideDown{from{opacity:0;transform:translateY(-40px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeLeft{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
    @keyframes fadeRight{from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
    @keyframes zoomBg{from{transform:scale(1)}to{transform:scale(1.1)}}

    /* RESPONSIVE */
    @media(max-width:900px){
      .card{grid-template-columns:1fr;width:90%}
      header{padding:20px}
    }
  </style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<header>
  <h1>Smart Internship</h1>
  <nav>
    <a href="SI1.html">Home</a>
    <a href="about.html">About us</a>
    <a href="admin.html">Admin</a>
    <a href="#">Info</a>
  </nav>
</header>

<div class="container">
  <div class="card">

    <div class="left">
      <h2>Join our community</h2>
      <p>let's help you <span>walk elegantly</span></p>
    </div>

    <div class="right">
      <h3>Get Started</h3>
      <input type="email" placeholder="Email">
      <input type="password" placeholder="Password">
      <a href="SI1.html"><button>Sign Up</button></a>

      <div class="social">
        <i class="fab fa-facebook-f"></i>
        <i class="fab fa-twitter"></i>
        <i class="fab fa-instagram"></i>
      </div>
    </div>

  </div>
</div>

<script>
  // Button feedback animation
  document.querySelector('button').addEventListener('click',()=>{
    alert('Welcome to the community!');
  })
</script>

</body>
</html>
